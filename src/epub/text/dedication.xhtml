			<p>
				<b>To Sir Robert Hart</b>
			</p>
			<p>To whose helpful encouragement I owe so much, I affectionately dedicate this account of my experiences at the Court of the country he has so long and faithfully served.</p>
			<footer>
				<p epub:type="z3998:signature">Katherine <abbr epub:type="z3998:given-name">A.</abbr> Carl.</p>
				<p>New York, <time datetime="1905-05">May, 1905</time>.</p>
			</footer>
		</section>
